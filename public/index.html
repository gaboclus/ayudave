<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#003893">
  <meta name="description" content="AyudaVE — ayuda humanitaria en Venezuela. Dona, sé voluntario o registra tu centro de acopio en menos de un minuto.">
  <title>AyudaVE — Ayuda humanitaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2'%3E%3Crect width='3' height='2' fill='%23fcd116'/%3E%3Crect width='3' height='2' y='0.667' fill='%23003893'/%3E%3Crect width='3' height='2' y='1.333' fill='%23cf142b'/%3E%3C/svg%3E">
</head>
<body>
  <div class="app" id="root"></div>

  <!-- Botón flotante: Compartir / Difundir -->
  <div id="share-fab" class="share-fab">
    <div class="share-menu" id="share-menu" hidden>
      <button class="sm-item" style="--c:#25D366" onclick="ayShare('whatsapp')"><svg class="smi" style="color:#25D366" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8.9-.3.2-.5 0a6.6 6.6 0 0 1-3.2-2.8c-.2-.4.2-.4.6-1.2.1-.2 0-.4 0-.5l-.7-1.7c-.2-.5-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-.9 2.2c0 1.3.9 2.5 1 2.7s1.9 3 4.6 4.1c1.7.7 2.3.8 3.1.7.5-.1 1.4-.6 1.6-1.1s.2-1 .1-1.1-.2-.2-.5-.3z"/></svg><span>WhatsApp</span></button>
      <button class="sm-item" style="--c:#1877F2" onclick="ayShare('facebook')"><svg class="smi" style="color:#1877F2" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.8-1.6 1.5V12h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z"/></svg><span>Facebook</span></button>
      <button class="sm-item" style="--c:#000000" onclick="ayShare('x')"><svg class="smi" style="color:#000000" viewBox="0 0 24 24" fill="currentColor"><path d="M18.2 2H21l-6.5 7.4L22 22h-6l-4.7-6.2L5.9 22H3l7-8L2 2h6.2l4.2 5.6L18.2 2zm-1 18h1.6L7 3.8H5.3L17.2 20z"/></svg><span>X (Twitter)</span></button>
      <button class="sm-item" style="--c:#0088cc" onclick="ayShare('telegram')"><svg class="smi" style="color:#0088cc" viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.3 18.7 19.6c-.2 1-.9 1.3-1.7.8l-4.6-3.4-2.2 2.1c-.3.3-.5.5-.9.5l.3-4.6 8.5-7.7c.4-.3-.1-.5-.6-.2L7 9.9 2.6 8.5c-1-.3-1-1 .2-1.4l18-7c.8-.3 1.5.2 1.1 1.2z"/></svg><span>Telegram</span></button>
      <button class="sm-item" style="--c:#E1306C" onclick="ayShare('flyer')"><svg class="smi" style="color:#E1306C" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5.5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="1.1" fill="currentColor" stroke="none"/></svg><span>Instagram</span></button>
      <button class="sm-item" style="--c:#5b6675" onclick="ayShare('copy')"><svg class="smi" style="color:#5b6675" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"/></svg><span>Copiar enlace</span></button>
      <button class="sm-item" style="--c:#003893" onclick="ayShare('native')"><svg class="smi" style="color:#003893" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg><span>Compartir en todos lados…</span></button>
    </div>
    <div class="share-row">
      <button class="share-btn" onclick="ayShareToggle()" aria-label="Difundir es ayudar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V4"/><path d="M7 9l5-5 5 5"/><path d="M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/></svg>
        <span class="sb-txt"><b>🚨 DIFUNDIR es AYUDAR</b><small>salva a más personas</small></span>
      </button>
      <button class="share-close" onclick="ayShareDismiss()" aria-label="Cerrar y ocultar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
  </div>
  <script>try{if(localStorage.getItem('ay_share_hidden')==='1'){var _f=document.getElementById('share-fab');if(_f)_f.style.display='none';}}catch(e){}</script>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="geo-ve.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
