<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="'Plus Jakarta Sans',-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="ar-down" markerWidth="12" markerHeight="12" refX="6" refY="9" orient="auto">
      <path d="M2 2 L6 9 L10 2" fill="none" stroke="#5b6675" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar-up" markerWidth="12" markerHeight="12" refX="6" refY="3" orient="auto">
      <path d="M2 10 L6 3 L10 10" fill="none" stroke="#0a7d3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .box{fill:#fff;stroke:#cdd6e2;stroke-width:1.5;rx:14}
      .t{fill:#0f1b2d;font-weight:700}
      .s{fill:#5b6675;font-weight:500}
      .lbl{fill:#5b6675;font-weight:600;font-size:12px}
      .conn{stroke:#5b6675;stroke-width:2;fill:none}
    </style>
  </defs>

  <!-- franja tricolor -->
  <rect x="0" y="0" width="320" height="6" fill="#fcd116"/>
  <rect x="320" y="0" width="320" height="6" fill="#003893"/>
  <rect x="640" y="0" width="320" height="6" fill="#cf142b"/>

  <text x="480" y="40" text-anchor="middle" font-size="22" class="t">AyudaVE — Arquitectura y flujo de datos</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" class="s">Node sin framework · base de datos y storage intercambiables por entorno · fuentes externas auto-sincronizadas</text>

  <!-- Usuarios -->
  <rect x="300" y="84" width="360" height="56" rx="14" class="box"/>
  <text x="480" y="110" text-anchor="middle" font-size="15" class="t">Usuarios — navegador / móvil</text>
  <text x="480" y="128" text-anchor="middle" font-size="12.5" class="s">PWA en JavaScript vanilla (public/)</text>
  <line x1="480" y1="140" x2="480" y2="176" class="conn" marker-end="url(#ar-down)"/>
  <text x="492" y="162" class="lbl">HTTPS</text>

  <!-- Cloudflare + LB -->
  <rect x="210" y="178" width="540" height="56" rx="14" class="box" fill="#eef4ff" stroke="#bcd0ef"/>
  <text x="480" y="204" text-anchor="middle" font-size="15" class="t">Cloudflare  →  Balanceador HTTPS (Google Cloud)</text>
  <text x="480" y="222" text-anchor="middle" font-size="12.5" class="s">Cloud CDN (caché de borde) + Cloud Armor (anti-DDoS / rate-limit)</text>
  <line x1="480" y1="234" x2="480" y2="270" class="conn" marker-end="url(#ar-down)"/>

  <!-- Cloud Run (central) -->
  <rect x="280" y="272" width="400" height="62" rx="14" fill="#003893"/>
  <text x="480" y="300" text-anchor="middle" font-size="16" fill="#fff" font-weight="800">Cloud Run — server.js (Node)</text>
  <text x="480" y="320" text-anchor="middle" font-size="12.5" fill="#cfe0ff">API JSON + auth + carga de fuentes · autoescala 1→N</text>

  <!-- conexiones a las 3 cajas -->
  <line x1="360" y1="334" x2="175" y2="386" class="conn" marker-end="url(#ar-down)"/>
  <line x1="480" y1="334" x2="480" y2="386" class="conn" marker-end="url(#ar-down)"/>
  <line x1="600" y1="334" x2="785" y2="386" class="conn" marker-end="url(#ar-down)"/>

  <!-- 3 cajas: SQL / Storage / memoria -->
  <rect x="40" y="388" width="270" height="66" rx="13" class="box"/>
  <text x="175" y="414" text-anchor="middle" font-size="14.5" class="t">Cloud SQL (PostgreSQL)</text>
  <text x="175" y="433" text-anchor="middle" font-size="12" class="s">15 tablas · SQLite en local</text>

  <rect x="345" y="388" width="270" height="66" rx="13" class="box"/>
  <text x="480" y="414" text-anchor="middle" font-size="14.5" class="t">Cloud Storage</text>
  <text x="480" y="433" text-anchor="middle" font-size="12" class="s">imágenes · disco en local</text>

  <rect x="650" y="388" width="270" height="66" rx="13" class="box" fill="#fffaf0" stroke="#f0dca8"/>
  <text x="785" y="414" text-anchor="middle" font-size="14.5" class="t">Caché en memoria</text>
  <text x="785" y="433" text-anchor="middle" font-size="12" class="s">fuentes de solo lectura</text>

  <!-- flecha fuentes -> memoria/cloud run -->
  <line x1="785" y1="556" x2="785" y2="458" class="conn" stroke="#0a7d3c" marker-end="url(#ar-up)"/>
  <text x="795" y="510" font-size="12px" font-weight="600" fill="#0a7d3c">import-*.js</text>
  <text x="795" y="526" font-size="11px" font-weight="600" fill="#0a7d3c">auto-refresco</text>

  <!-- Fuentes externas -->
  <rect x="40" y="558" width="880" height="170" rx="16" fill="#f5f8fc" stroke="#cdd6e2" stroke-width="1.5"/>
  <text x="60" y="586" font-size="14.5" class="t">Fuentes externas — públicas/abiertas, con atribución</text>
  <text x="60" y="606" font-size="12" class="s">cada una en su módulo import-*.js · normalizadas a nuestro esquema · privacidad mínima para reunificación</text>

  <!-- chips -->
  <g font-size="12.5" font-weight="600">
    <rect x="60"  y="624" width="200" height="38" rx="10" fill="#fff" stroke="#cf142b" stroke-width="1.5"/>
    <text x="160" y="648" text-anchor="middle" fill="#0f1b2d">Desaparecidos</text>
    <rect x="272" y="624" width="200" height="38" rx="10" fill="#fff" stroke="#003893" stroke-width="1.5"/>
    <text x="372" y="648" text-anchor="middle" fill="#0f1b2d">Centros de acopio</text>
    <rect x="484" y="624" width="200" height="38" rx="10" fill="#fff" stroke="#0a7d3c" stroke-width="1.5"/>
    <text x="584" y="648" text-anchor="middle" fill="#0f1b2d">Hospitales (OCR)</text>
    <rect x="696" y="624" width="200" height="38" rx="10" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
    <text x="796" y="648" text-anchor="middle" fill="#0f1b2d">Reportes de servicios</text>

    <rect x="60"  y="672" width="200" height="38" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="160" y="696" text-anchor="middle" fill="#0f1b2d">Edificios afectados</text>
    <rect x="272" y="672" width="200" height="38" rx="10" fill="#fff" stroke="#0891b2" stroke-width="1.5"/>
    <text x="372" y="696" text-anchor="middle" fill="#0f1b2d">Directorio emergencia</text>
    <rect x="484" y="672" width="200" height="38" rx="10" fill="#fff" stroke="#475569" stroke-width="1.5"/>
    <text x="584" y="696" text-anchor="middle" fill="#0f1b2d">Sismos (USGS)</text>
    <rect x="696" y="672" width="200" height="38" rx="10" fill="#fff" stroke="#cdd6e2" stroke-width="1.5"/>
    <text x="796" y="696" text-anchor="middle" fill="#5b6675">+ nuevas (devs)</text>
  </g>
</svg>
